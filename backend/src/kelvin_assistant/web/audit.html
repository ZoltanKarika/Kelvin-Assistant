<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelvin Assistant - Audit</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <a class="brand" href="/ui" aria-label="Kelvin Assistant kezdőlap">
          <span class="brand-mark" aria-hidden="true">K</span>
          <span>
            <strong>Kelvin</strong>
            <small>Local intelligence</small>
          </span>
        </a>
        <div class="header-actions">
          <div class="runtime-status" role="status" aria-live="polite">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="runtime-status-text">Kapcsolódás…</span>
          </div>
        </div>
      </header>
      <div class="app-body">
        <nav class="app-nav">
          <ul>
            <li><a href="/ui">Chat</a></li>
            <li><a href="/ui/runs">Runs</a></li>
            <li><a href="/ui/approvals">Approvals</a></li>
            <li><a href="/ui/audit" class="active" aria-current="page">Audit</a></li>
            <li><a href="/ui/settings">Settings</a></li>
            <li><a href="/ui/n8n">n8n</a></li>
          </ul>
        </nav>
        <main class="main-panel audit-layout">
          <div class="audit-header-row">
            <h1>Biztonsági napló (Audit)</h1>
            <div class="audit-filters-bar">
              <div class="filter-group">
                <label for="filter-event-type">Esemény:</label>
                <select id="filter-event-type">
                  <option value="all">Minden esemény</option>
                  <option value="input_guard">Input Guard</option>
                  <option value="output_guard">Output Guard</option>
                </select>
              </div>
              <div class="filter-group">
                <label for="filter-decision">Döntés:</label>
                <select id="filter-decision">
                  <option value="all">Minden döntés</option>
                  <option value="allow">Engedélyezett</option>
                  <option value="block">Blokkolt</option>
                </select>
              </div>
              <div class="filter-group">
                <label for="filter-run-id">Futás ID:</label>
                <input type="text" id="filter-run-id" placeholder="Keresés futás ID alapján…">
              </div>
              <div class="filter-group">
                <label for="filter-correlation-id">Korrelációs ID:</label>
                <input type="text" id="filter-correlation-id" placeholder="Keresés korrelációs ID alapján…">
              </div>
              <button id="reset-filters-btn" class="secondary-button">Szűrők törlése</button>
            </div>
          </div>

          <div class="audit-table-container">
            <table class="audit-table">
              <thead>
                <tr>
                  <th>Időbélyeg</th>
                  <th>Esemény</th>
                  <th>Döntés</th>
                  <th>Kapcsolódó futás</th>
                  <th>Korreláció</th>
                  <th>Tartalom</th>
                  <th>Figyelmeztetések</th>
                </tr>
              </thead>
              <tbody id="audit-log-rows">
                <tr>
                  <td colspan="7" class="loading-state">Audit napló betöltése…</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="audit-footer-row">
            <button id="load-more-btn" class="secondary-button" style="display: none;">Továbbiak betöltése</button>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/static/audit.js?v=1.0.0-ui-auth"></script>
  </body>
</html>
