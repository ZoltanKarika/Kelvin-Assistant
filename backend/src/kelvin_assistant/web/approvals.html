<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelvin Assistant - Approvals</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <a class="brand" href="/ui" aria-label="Kelvin Assistant kezdőlap">
          <span class="brand-mark" aria-hidden="true">K</span>
          <span>
            <strong>Kelvin</strong>
            <small>Local intelligence</small>
          </span>
        </a>
        <div class="header-actions">
          <div class="runtime-status" role="status" aria-live="polite">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="runtime-status-text">Kapcsolódás…</span>
          </div>
        </div>
      </header>
      <div class="app-body">
        <nav class="app-nav">
          <ul>
            <li><a href="/ui">Chat</a></li>
            <li><a href="/ui/runs">Runs</a></li>
            <li><a href="/ui/approvals" class="active" aria-current="page">Approvals</a></li>
            <li><a href="/ui/audit">Audit</a></li>
            <li><a href="/ui/settings">Settings</a></li>
            <li><a href="/ui/n8n">n8n</a></li>
          </ul>
        </nav>
        <main class="main-panel runs-layout">
          <div class="runs-sidebar">
            <div class="runs-header">
              <h1>Jóváhagyások</h1>
            </div>
            <div id="approvals-list" class="runs-list">
              <div class="loading-state">Jóváhagyások betöltése…</div>
            </div>
          </div>
          <div id="approval-detail" class="run-detail">
            <div class="empty-state">
              <span class="empty-icon">✓</span>
              <p>Nincs függőben lévő jóváhagyási kérés</p>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/static/approvals.js"></script>
  </body>
</html>
