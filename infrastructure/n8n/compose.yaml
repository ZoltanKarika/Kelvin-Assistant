name: kelvin-automation

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  postgres:
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE must be configured}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_DB_NAME:?N8N_DB_NAME must be configured}
      POSTGRES_USER: ${N8N_DB_USER:?N8N_DB_USER must be configured}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:?N8N_DB_PASSWORD must be configured}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    shm_size: 128mb
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  n8n:
    image: ${N8N_IMAGE:?N8N_IMAGE must be configured}
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 127.0.0.1:5678:5678
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:?N8N_DB_NAME must be configured}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:?N8N_DB_USER must be configured}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?N8N_DB_PASSWORD must be configured}
      DB_POSTGRESDB_SCHEMA: public

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be configured}
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_LISTEN_ADDRESS: 0.0.0.0
      N8N_EDITOR_BASE_URL: http://localhost:5678/
      WEBHOOK_URL: http://localhost:5678/

      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Budapest}
      TZ: ${TZ:-Europe/Budapest}

      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_COMMUNITY_PACKAGES_ENABLED: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
      N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES: "true"
      NODES_EXCLUDE: >-
        ["n8n-nodes-base.executeCommand",
        "n8n-nodes-base.readWriteFile",
        "n8n-nodes-base.localFileTrigger",
        "n8n-nodes-base.ssh"]

      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: "10000"
      N8N_LOG_LEVEL: info
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - automation
      - database
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch("http://127.0.0.1:5678/healthz")
          .then((response) => {
            if (!response.ok) process.exit(1);
          })
          .catch(() => process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

networks:
  automation:
  database:
    internal: true

volumes:
  n8n_data:
  postgres_data:
