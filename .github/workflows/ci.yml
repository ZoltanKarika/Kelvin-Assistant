name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Python quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      UV_PYTHON: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.25"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install "$UV_PYTHON"

      - name: Install project
        run: uv sync --locked --all-groups

      - name: Lint
        run: uv run --locked ruff check backend tests

      - name: Check formatting
        run: uv run --locked ruff format --check backend tests

      - name: Type check
        run: uv run --locked mypy backend/src tests

      - name: Test
        run: uv run --locked pytest --cov=kelvin_assistant --cov-report=term-missing
